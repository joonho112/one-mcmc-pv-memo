name: Publish (Quarto → GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Attribute the auto-generated gh-pages build commits to the author
          # (git honors these over any config the runner sets).
          GIT_AUTHOR_NAME: joonho112
          GIT_AUTHOR_EMAIL: 8888484+joonho112@users.noreply.github.com
          GIT_COMMITTER_NAME: joonho112
          GIT_COMMITTER_EMAIL: 8888484+joonho112@users.noreply.github.com
